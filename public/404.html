<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found - E-Serikali Mtaa</title>
  <script>
    // Single Page App redirect for Vercel
    // Redirects all 404s to index.html with the original path
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    window.location.replace('/' + (path ? '?redirect=' + encodeURIComponent(path + search + hash) : ''));
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f5f4 0%, #e7e5e4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .code {
      font-size: 120px;
      font-weight: 900;
      color: #d1fae5;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      color: #1c1917;
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      color: #78716c;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      background: #059669;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      background: #047857;
    }
  </style>
</head>
<body>
  <noscript>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you are looking for does not exist or has been moved.</p>
      <a href="/">Go Home</a>
    </div>
  </noscript>
</body>
</html>
